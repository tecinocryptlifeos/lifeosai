<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#050505">
<meta name="robots" content="noindex,nofollow">
<title>LifeOS Gemini Live</title>
<style>
:root{color-scheme:dark;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#050505;color:#f7efd8}
*{box-sizing:border-box}
body{margin:0;min-height:100svh;display:grid;place-items:center;padding:20px;background:radial-gradient(circle at 50% 18%,#33240d 0,transparent 38%),linear-gradient(180deg,#090909,#020202)}
main{width:min(100%,520px);padding:28px 22px;border:1px solid rgba(226,178,66,.45);border-radius:24px;background:rgba(9,9,9,.9);box-shadow:0 24px 70px rgba(0,0,0,.55);text-align:center}
.brand{font-size:13px;font-weight:900;letter-spacing:.22em;color:#e8bd55}
h1{margin:8px 0 0;font-size:clamp(27px,8vw,40px)}
p{line-height:1.5}
.subtitle{margin:8px 0 20px;color:rgba(247,239,216,.65)}
.orb{width:150px;height:150px;margin:18px auto 25px;border-radius:50%;border:2px solid rgba(228,181,69,.72);background:radial-gradient(circle,rgba(239,196,91,.35),transparent 62%);box-shadow:inset 0 0 38px rgba(239,196,91,.18),0 0 34px rgba(239,196,91,.14)}
.orb.active{animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{50%{transform:scale(1.06);box-shadow:inset 0 0 52px rgba(91,232,156,.24),0 0 54px rgba(91,232,156,.24)}}
button{width:100%;min-height:58px;border:1px solid #e4b647;border-radius:15px;background:linear-gradient(180deg,#edc258,#bb8422);color:#151005;font-size:17px;font-weight:850}
button:disabled{opacity:.58}
#status{min-height:44px;margin:17px 0 2px;color:rgba(247,239,216,.72);line-height:1.45}
#status.active{color:#94eeba}
#status.error{color:#ff9c9c}
.note{margin:15px 0 0;color:rgba(247,239,216,.45);font-size:12px}
a{color:#e6bd58}
</style>
</head>
<body>
<main>
  <div class="brand">LIFE OS</div>
  <h1>Gemini Live</h1>
  <p class="subtitle">Continuous real-time voice conversation with Sophia.</p>
  <div id="orb" class="orb" aria-hidden="true"></div>
  <button id="liveButton" type="button">Start Live Conversation</button>
  <div id="status" role="status" aria-live="polite">Ready</div>
  <p class="note">
    The permanent Gemini API key stays on the LifeOS server.<br>
    <a href="/chat">Return to Decision Chat</a>
  </p>
</main>
<script src="/assets/gemini_live_v1.js?v=1.0.0"></script>
<!-- LIFEOS_GEMINI_LIVE_PAGE_V1 -->
</body>
</html>
