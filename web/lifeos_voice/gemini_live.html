<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#050505">
<meta name="robots" content="noindex,nofollow">
<title>LifeOS Synthetic Intelligence</title>
<style>
:root{color-scheme:dark;font-family:system-ui,-apple-system,Segoe UI,sans-serif;color:#fff3cf;background:transparent}
*{box-sizing:border-box}
html,body{width:100%;min-height:100%}
body{margin:0;min-height:100svh;display:grid;place-items:center;padding:max(16px,env(safe-area-inset-top)) max(16px,env(safe-area-inset-right)) max(18px,env(safe-area-inset-bottom)) max(16px,env(safe-area-inset-left));background:radial-gradient(circle at 50% 32%,rgba(248,188,46,.16),transparent 36%),rgba(2,4,8,.88);backdrop-filter:blur(8px)}
body.embedded{background:linear-gradient(180deg,rgba(2,4,8,.46),rgba(2,4,8,.68))}
main{width:min(100%,480px);padding:24px 20px 20px;border:1px solid rgba(239,188,61,.55);border-radius:24px;background:linear-gradient(180deg,rgba(12,15,22,.90),rgba(5,7,11,.94));box-shadow:0 26px 80px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.04);text-align:center}
.brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px;font-size:12px;font-weight:900;letter-spacing:.20em;color:#eac15a}
.brand img{width:36px;height:36px;border-radius:50%;object-fit:cover;border:1px solid rgba(238,189,70,.65)}
h1{margin:4px 0 0;font-size:clamp(25px,7vw,37px);letter-spacing:-.035em}
.subtitle{margin:7px auto 17px;max-width:340px;color:rgba(255,247,223,.65);font-size:14px;line-height:1.42}
.orb{position:relative;width:138px;height:138px;margin:18px auto 22px;border-radius:50%;border:2px solid rgba(232,184,67,.78);background:radial-gradient(circle,rgba(241,194,86,.31),transparent 60%),rgba(7,9,13,.8);box-shadow:inset 0 0 40px rgba(239,188,61,.16),0 0 34px rgba(239,188,61,.15)}
.orb::before,.orb::after{content:"";position:absolute;inset:14%;border:1px solid rgba(238,188,67,.45);border-radius:50%;opacity:0}
.orb.active::before{animation:lifeosWave 1.25s ease-out infinite}
.orb.active::after{animation:lifeosWave 1.25s .42s ease-out infinite}
@keyframes lifeosWave{from{opacity:.7;transform:scale(.72)}to{opacity:0;transform:scale(1.42)}}
.primary{width:100%;min-height:56px;border:1px solid #e8b844;border-radius:15px;background:linear-gradient(180deg,#efc75e,#b87d1d);color:#171005;font-size:16px;font-weight:900}
.primary:disabled,.control:disabled{opacity:.52}
.controls{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:10px}
.control{min-height:48px;padding:8px 6px;border:1px solid rgba(234,190,83,.42);border-radius:13px;background:rgba(18,21,28,.92);color:#fff0c4;font-size:12px;font-weight:800;line-height:1.15}
.control.active{border-color:rgba(102,224,154,.72);color:#a8f0c5}
.control.warn{border-color:rgba(255,143,143,.62);color:#ffb5b5}
#status{min-height:42px;margin:15px 0 0;color:rgba(255,247,223,.72);font-size:14px;line-height:1.4}
#status.active{color:#9ce9bd}
#status.error{color:#ffabab}
#outputLabel{min-height:18px;margin:3px 0 0;color:rgba(255,247,223,.45);font-size:11px}
.note{margin:14px 0 0;color:rgba(255,247,223,.38);font-size:11px;line-height:1.35}
a{color:#ebc25c}
@media(max-width:390px){main{padding:21px 15px 17px}.control{font-size:11px}}
</style>
<!-- LIFEOS_VOICE_BACKGROUND_VOLUME_REPAIR_V1_BACKGROUND_START -->
<style id="lifeos-original-voice-background-v1">
html,
body {
  background:#030302 !important;
}

body,
body.embedded {
  position:relative;
  background:
    linear-gradient(
      180deg,
      rgba(0,0,0,.18) 0%,
      rgba(0,0,0,.24) 52%,
      rgba(0,0,0,.42) 100%
    ),
    url("/assets/lifeos-bg.jpg") center center / cover no-repeat fixed !important;
}

body::before {
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
  background:
    radial-gradient(
      circle at 50% 38%,
      rgba(255,194,46,.16),
      transparent 42%
    );
}

main {
  background:rgba(4,6,10,.34) !important;
  backdrop-filter:blur(2px) !important;
  -webkit-backdrop-filter:blur(2px) !important;
}
</style>
<!-- LIFEOS_VOICE_BACKGROUND_VOLUME_REPAIR_V1_BACKGROUND_END -->


<!-- LIFEOS_VOICE_LAYOUT_FOOTER_REPAIR_V1_STYLE_START -->
<style id="lifeos-voice-layout-footer-repair-v1">
main {
  min-height:min(1110px,calc(100svh - 30px)) !important;
  display:flex !important;
  flex-direction:column !important;
}

#orb {
  width:172px !important;
  height:172px !important;
  margin:30px auto 42px !important;
  flex:0 0 auto !important;
}

#liveButton {
  margin-top:auto !important;
}

.controls {
  margin-top:12px !important;
}

#status {
  margin-top:18px !important;
}

#outputLabel {
  margin-top:8px !important;
}

.note {
  margin-top:16px !important;
}

.lifeos-voice-footer {
  margin-top:24px !important;
  padding:14px 10px 2px !important;
  border-top:1px solid rgba(234,190,83,.42) !important;
  color:rgba(255,247,223,.76) !important;
  font-size:11px !important;
  line-height:1.55 !important;
  text-align:center !important;
}

@media (max-width:390px) {
  #orb {
    width:160px !important;
    height:160px !important;
    margin:26px auto 36px !important;
  }

  .lifeos-voice-footer {
    font-size:10.5px !important;
  }
}
</style>
<!-- LIFEOS_VOICE_LAYOUT_FOOTER_REPAIR_V1_STYLE_END -->

</head>
<body>
<main>
  <div class="brand"><img src="/assets/lifeos-logo.jpg" alt=""><span>LIFE OS</span></div>
  <h1>LifeOS Synthetic Intelligence</h1>
<div id="orb" class="orb" aria-hidden="true"></div>
  <button id="liveButton" class="primary" type="button">Start Live Conversation</button>
  <div class="controls" aria-label="Voice controls">
    <button id="micButton" class="control active" type="button" disabled>Mic On</button>
    <button id="speakerButton" class="control active" type="button" disabled>Speaker On</button>
    <button id="outputButton" class="control" type="button">Audio Output</button>
  </div>
  <div id="status" role="status" aria-live="polite">Ready</div>
  <div id="outputLabel">Output: phone default</div>
  <audio id="sophiaAudio" autoplay playsinline aria-hidden="true"></audio>
  <p class="note">No clear-conversation control is used.<span id="returnLink"><br><a href="/chat">Return to Decision Chat</a></span></p>

  <footer id="lifeosVoiceFooterV1" class="lifeos-voice-footer">
    LFOSAI Voice synthetic intelligent agent.<br>
    Powered by Hansa Freak Ltd, built by Life OsDaily and Tecino's channel.
  </footer>

</main>
<script>
(function(){
  "use strict";
  var embedded=new URLSearchParams(window.location.search).get("embedded")==="1";
  document.body.classList.toggle("embedded",embedded);
  if(embedded){
    var returnLink=document.getElementById("returnLink");
    if(returnLink)returnLink.hidden=true;
  }
}());
</script>
<script src="/assets/gemini_live_v1.js?v=2.0.0"></script>

<!-- LIFEOS_IDENTITY_ATTRIBUTION_UPGRADE_V2 -->
<!-- LIFEOS_VOICE_LAYOUT_FOOTER_REPAIR_V1 -->
</body>
</html>
