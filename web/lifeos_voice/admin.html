<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LifeOS Admin</title><style>body{margin:0;background:#05070b;color:#fff3cf;font-family:system-ui;padding:20px}main{max-width:1100px;margin:auto}.top{display:flex;justify-content:space-between;align-items:center}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}.card,section{border:1px solid #6b5422;background:#0c0f16;border-radius:14px;padding:14px}.metric{font-size:28px;font-weight:900}.label{color:#b9af95;font-size:12px}table{width:100%;border-collapse:collapse;font-size:12px}th,td{padding:9px;border-bottom:1px solid #2a2d35;text-align:left;vertical-align:top}button,a{color:#eac15a}#message{margin:12px 0}.scroll{overflow:auto;max-height:440px}</style></head><body><main><div class="top"><h1>LifeOS Operations</h1><a href="/voice">Voice</a></div><p id="message">Authenticating…</p><div id="dashboard" hidden><div id="metrics" class="grid"></div><section><h2>Recent users</h2><div class="scroll"><table><thead><tr><th>Email</th><th>Name</th><th>Created</th><th>Last sign-in</th><th>Status</th></tr></thead><tbody id="users"></tbody></table></div></section><section><h2>Recent activity and problems</h2><div class="scroll"><table><thead><tr><th>Time</th><th>User</th><th>Event</th><th>Device</th><th>Problem</th></tr></thead><tbody id="events"></tbody></table></div></section></div></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="/assets/lifeos_auth_v1.js?v=1.0.0"></script><script src="/assets/lifeos_admin_v1.js?v=1.0.0"></script></body></html>
