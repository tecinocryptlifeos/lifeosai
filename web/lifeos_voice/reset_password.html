<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <link rel="canonical" href="https://losai.onrender.com/reset-password">
  <title>Reset LifeOS Password</title>
  <style>
    :root{color-scheme:dark;--gold:#eabe53;--cream:#fff3cf;--muted:rgba(255,247,223,.72)}
    *{box-sizing:border-box}body{min-height:100dvh;margin:0;display:grid;place-items:center;padding:18px;background:radial-gradient(circle at 50% 20%,#2b210d,#05060a 55%);font-family:Inter,system-ui,sans-serif;color:var(--cream)}
    main{width:min(520px,100%);padding:24px;border:1px solid rgba(234,190,83,.42);border-radius:22px;background:rgba(5,7,12,.9);box-shadow:0 30px 90px #000b}h1{margin:0 0 8px;color:var(--gold)}p{color:var(--muted);line-height:1.55}
    input,button,a{width:100%;min-height:48px;margin-top:10px;border-radius:12px;font:inherit}input{padding:0 13px;border:1px solid rgba(234,190,83,.4);background:#0b0e14;color:#fff}button{border:1px solid #f0ce72;background:linear-gradient(#efc75e,#b87d1d);color:#171005;font-weight:900}a{display:grid;place-items:center;border:1px solid rgba(234,190,83,.4);color:var(--cream);text-decoration:none}#resetMessage[data-kind="error"]{color:#ffabb3}#resetMessage[data-kind="ok"]{color:#9ff0bb}#resetMessage[data-kind="warning"]{color:#ffd78b}[hidden]{display:none!important}
  </style>
</head>
<body>
  <main>
    <h1>Reset LifeOS password</h1>
    <p id="resetMessage" role="status" aria-live="polite">Verifying the password-reset link…</p>
    <input id="newPassword" type="password" autocomplete="new-password" placeholder="New password">
    <input id="confirmPassword" type="password" autocomplete="new-password" placeholder="Confirm new password">
    <button id="resetPassword" type="button">Update password</button>
    <a id="returnToLifeOS" href="/chat" hidden>Return to LifeOS</a>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.3/dist/umd/supabase.js" integrity="sha384-sihuiVHG7vyEIuePVbLI4QpHu1dbhCZe4Zqp0FuqnFeEnyIhF3koyXoBZyfbFsYs" crossorigin="anonymous"></script>
  <script src="/assets/lifeos_account_v1.js?v=2.1.0"></script>
  <script src="/assets/lifeos_reset_password_v1.js?v=2.1.0"></script>
</body>
</html>
