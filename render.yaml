services:
  - type: web
    name: losai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app/lifeos_voice_server.py
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: LIFEOS_GEMINI_LIVE_PRIMARY_MODEL
        value: gemini-3.1-flash-live-preview
      - key: LIFEOS_GEMINI_LIVE_FALLBACK_MODEL
        value: gemini-2.5-flash-native-audio-preview-12-2025
      - key: LIFEOS_HOST
        value: 0.0.0.0
      - key: LIFEOS_PUBLIC_SITE_ORIGIN
        value: https://losai.onrender.com
      - key: LIFEOS_TTS_VOICE
        value: Despina
      - key: LIFEOS_TTS_MODEL
        value: gemini-3.1-flash-tts-preview
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: LIFEOS_ADMIN_EMAILS
        sync: false
      - key: LIFEOS_AUTH_REQUIRED
        value: true
      - key: LIFEOS_EMAIL_AUTH_ENABLED
        value: true
      - key: LIFEOS_REGISTRATION_ENABLED
        value: true
      - key: LIFEOS_MINIMUM_AGE
        value: 13
      - key: LIFEOS_PASSWORD_MIN_LENGTH
        value: 10
      - key: LIFEOS_GOOGLE_AUTH_ENABLED
        value: true
      - key: LIFEOS_ADSENSE_PUBLISHER_ID
        sync: false
      - key: LIFEOS_QUEUE_GMAIL_ADDRESS
        value: losaiadminpatric@gmail.com
      - key: LIFEOS_QUEUE_GOOGLE_CLIENT_ID
        sync: false
      - key: LIFEOS_QUEUE_GOOGLE_CLIENT_SECRET
        sync: false
      - key: LIFEOS_QUEUE_GOOGLE_REFRESH_TOKEN
        sync: false
      - key: LIFEOS_QUEUE_INTERNAL_SECRET
        sync: false
      - key: LIFEOS_QUEUE_WORKER_ENABLED
        value: false
      - key: LIFEOS_QUEUE_POLL_SECONDS
        value: 60
      - key: LIFEOS_QUEUE_REPLY_SYNC_SECONDS
        value: 900
