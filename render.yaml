services:
  - type: web
    name: lifeos-ai-voice-app
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app/lifeos_voice_server.py
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: LIFEOS_HOST
        value: 0.0.0.0
      - key: LIFEOS_TTS_VOICE
        value: Despina
      - key: LIFEOS_TTS_MODEL
        value: gemini-3.1-flash-tts-preview
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: LIFEOS_ADMIN_EMAILS
        sync: false
      - key: LIFEOS_AUTH_REQUIRED
        value: false
      - key: LIFEOS_GOOGLE_AUTH_ENABLED
        value: true
